name: Cleanup Old Commits

on:
  schedule:
    # Läuft jeden 1. des Monats um 2:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:  # Manuelle Ausführung möglich

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove commits older than 30 days
        run: |
          CUTOFF_DATE=$(date -d "30 days ago" +%s)
          echo "Lösche alle Commits älter als: $(date -d @$CUTOFF_DATE)"
          
          python3 -m pip install -q git-filter-repo
          
          git filter-repo --force \
            --commit-filter '
              import os
              timestamp = int(os.environ.get("GIT_COMMIT_DATE", 0))
              cutoff = '"$CUTOFF_DATE"'
              if timestamp > cutoff:
                  return True
              return False
            ' || true

      - name: Force push cleaned history
        run: |
          git push origin main --force --quiet || echo "Keine Änderungen zum Pushen"
