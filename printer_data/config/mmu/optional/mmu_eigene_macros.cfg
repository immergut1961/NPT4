#####################################################################
# Materialabhängiges TIP-FORMING (V2 - Autodetect)
#####################################################################

[gcode_macro _SET_MATERIAL_VARS]
description: Setzt Tip-Forming Parameter (Sticky Version)
gcode:
    # 1. Material bestimmen (Parameter > Status)
    {% set MAT_PARAM = params.MATERIAL | default("") | upper %}
    {% set MAT_STATUS = printer.mmu.filament_type | default("") | upper %}
    {% set MATERIAL = MAT_PARAM if MAT_PARAM != "" else MAT_STATUS %}

    # FALLS MATERIAL LEER IST: Nichts tun, keine Warnung, keine Defaults!
    {% if MATERIAL == "" or MATERIAL == "UNKNOWN" %}
        {action_respond_info("MMU: Kein neues Material erkannt. Behalte bestehende Parameter bei.")}
        M106 S255 ; Wir machen trotzdem den Lüfter an, sicher ist sicher.
    {% else %}
        {action_respond_info("MMU: Profil-Check für: '" ~ MATERIAL ~ "'")}
    
        {% if "PETG" in MATERIAL %}
            {action_respond_info("MMU: PETG Profil aktiv")}
            M106 S255 ; Schock-Kühlung an
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=210
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=150
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=80
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=5
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=True
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=skinnydip_distance VALUE=26.3
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=dip_extraction_speed VALUE=900
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=melt_zone_pause VALUE=50

        {% elif "PLA" in MATERIAL %}
            {action_respond_info("MMU: PLA Profil aktiv (Finale Faden-Einkürzung)")}
            M106 S255 ; Schock-Kühlung an
            
            ; 1. Ramming (Beibehalten, da es den Plopp perfekt eliminiert hat)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=3
            
            ; 2. Temperatur beim Werkzeugwechsel
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=190
            
            ; 3. Geschwindigkeit des allerersten Rückzugs
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=100
            
            ; 4. Erste Geschwindigkeit der Kühlbewegung (Maximiert auf 75, um den Faden zu kappen)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=50
            
            ; 5. Position des Kühlrohrs
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=50
            
            ; 6. Länge des Kühlrohrs
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=10
            
            ; 7. Anzahl der Kühlbewegungen
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=0
            
            ; 8. Skinnydip bleibt dauerhaft AUS
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=True
            
            ; 9. Distanz (Inaktiv)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=skinnydip_distance VALUE=30
            
            ; 10. Geschwindigkeit beim Herausziehen (Inaktiv)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=dip_extraction_speed VALUE=800
            
            ; 11. Verweilzeit im Hotend (Inaktiv)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=melt_zone_pause VALUE=300

        {% else %}
            {action_respond_info("WARNUNG: Material '" ~ MATERIAL ~ "' unbekannt! Lade DEFAULT.")}
            Frame_Light_OFF
            G4 P500
            Frame_Light_ON
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=0 
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=10
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=60
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=12
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=False
        {% endif %}
    {% endif %} # <--- Dieses ENDIF hat gefehlt, um die Sticky-Logik zu schließen!

