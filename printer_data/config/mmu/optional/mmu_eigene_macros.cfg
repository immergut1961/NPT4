[gcode_macro MMU_RECOVER_LOADED]
gcode:
    {% set loaded = params.LOADED|default(1)|int %}
    MMU_RECOVER LOADED={loaded}

[gcode_macro MMU_SET_STATE]
description: Schaltet die MMU ein (1) oder aus (0)
gcode:
    {% set state = params.STATE|default(1)|int %}
    
    {% if state == 1 %}
        MMU ENABLE=1
        { action_respond_info("MMU wurde AKTIVIERT.") }
    {% elif state == 0 %}
        MMU ENABLE=0
        { action_respond_info("MMU wurde DEAKTIVIERT.") }
    {% else %}
        { action_raise_error("Ungültiger Status: Nutze STATE=0 oder STATE=1") }
    {% endif %}
    
#####################################################################
# Gate Parking
#####################################################################
[gcode_macro TEST_GATE_PARKING_FULL]
gcode:
    {% set gate = params.GATE|default(0)|int %}
    
    M117 Lade Gate {gate} bis zum Toolhead-Sensor...
    MMU_SELECT GATE={gate}
    
    # Lädt das Filament bis zum Sensor vor der Düse. 
    # Durch 'TERMINATING_STATUS=mmu_toolhead' stoppt er dort und 
    # versucht nicht, in die (kalte) Düse zu extrudieren.
    MMU_LOAD TERMINATING_STATUS=mmu_toolhead
    
    G4 P2000 # 2 Sekunden warten, damit du die Position am Sensor prüfen kannst
    
    M117 Entlade zum Parken...
    # Hier greifen jetzt deine Einstellungen für 'gate_unload_buffer' 
    # und 'gate_parking_distance'
    MMU_UNLOAD
    
    M117 Fertig! Position im Gate prüfen.

#####################################################################
# Toolchange Temperatur
#####################################################################
[gcode_macro MMU_TOOLCHANGE_TEMP]
variable_temp_pla: 190
variable_temp_petg: 210
gcode:
    # Leer lassen
[gcode_macro TOOLCHANGE_TEMP_PLA]
gcode:
    {% set temp = params.VALUE|default(190)|int %}
    SET_GCODE_VARIABLE MACRO=MMU_TOOLCHANGE_TEMP VARIABLE=temp_pla VALUE={temp}
    M117 PLA Toolchange Temp: {temp}C

[gcode_macro TOOLCHANGE_TEMP_PETG]
gcode:
    {% set temp = params.VALUE|default(210)|int %}
    SET_GCODE_VARIABLE MACRO=MMU_TOOLCHANGE_TEMP VARIABLE=temp_petg VALUE={temp}
    M117 PETG Toolchange Temp: {temp}C

[gcode_macro CHECK_MMU_TEMPS]
gcode:
    {% set pla = printer["gcode_macro MMU_TOOLCHANGE_TEMP"].temp_pla %}
    {% set petg = printer["gcode_macro MMU_TOOLCHANGE_TEMP"].temp_petg %}
    { action_respond_info("Aktuelle MMU Toolchange Temperaturen:
                           PLA:  %s°C
                           PETG: %s°C" % (pla, petg)) }

[gcode_macro APPLY_MMU_TEMP_PLA]
gcode:
    {% set t = printer["gcode_macro MMU_TOOLCHANGE_TEMP"].temp_pla %}
    SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE={t}
    M117 MMU: PLA Temp {t}C aktiv

[gcode_macro APPLY_MMU_TEMP_PETG]
gcode:
    {% set t = printer["gcode_macro MMU_TOOLCHANGE_TEMP"].temp_petg %}
    SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE={t}
    M117 MMU: PETG Temp {t}C aktiv

#####################################################################
# Materialabhängiges TIP-FORMING (V2 - Autodetect)
#####################################################################

[gcode_macro _SET_MATERIAL_VARS]
description: Setzt Tip-Forming Parameter (Maximale Kompatibilität)
gcode:
    # 1. Priorität: Übergabe per Parameter (Slicer/Start-Makro)
    {% set MAT_PARAM = params.MATERIAL | default("") | upper %}
    # 2. Priorität: Aktueller Happy Hare Status
    {% set MAT_STATUS = printer.mmu.filament_type | default("") | upper %}
    # 3. Priorität: Datenbank-Eintrag des aktuell geladenen Tools (Backup für Unload am Ende)
    {% set MAT_TOOL = printer.mmu.tool_filament[printer.mmu.tool] | default("") | upper %}
    
    # Logik zur Bestimmung des Namens
    {% if MAT_PARAM != "" %}
        {% set MATERIAL = MAT_PARAM %}
    {% elif MAT_STATUS != "" %}
        {% set MATERIAL = MAT_STATUS %}
    {% else %}
        {% set MATERIAL = MAT_TOOL %}
    {% endif %}

    {action_respond_info("MMU: Profil-Check für Material: '" ~ MATERIAL ~ "'")}
    
    {% if "PETG" in MATERIAL %}
        {action_respond_info("MMU: PETG Profil aktiv")}
        M106 S255 ; Schock-Kühlung an
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=210
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=150
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=80
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=5
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=True
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=skinnydip_distance VALUE=26.3
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=dip_extraction_speed VALUE=900
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=melt_zone_pause VALUE=50

    {% elif "PLA" in MATERIAL %}
        {action_respond_info("MMU: PLA Profil aktiv")}
        M106 S255 ; Schock-Kühlung an
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=190
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=10
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=5
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=8
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=True
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=skinnydip_distance VALUE=25.5
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=dip_extraction_speed VALUE=500
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=melt_zone_pause VALUE=150

    {% else %}
        {action_respond_info("WARNUNG: Material '" ~ MATERIAL ~ "' unbekannt! Lade DEFAULT.")}
        M107    ; Schaltet den Bauteillüfter aus.
        Frame_Light_OFF
        G4 P500
        Frame_Light_ON
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=0 
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=10
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=60
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=12
        SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=False
    {% endif %}

[gcode_macro _MMU_POST_FORM_TIP]
description: Wird automatisch von Happy Hare nach dem Formvorgang aufgerufen
gcode:
    M107 ; Schaltet den Bauteillüfter wieder aus
    {action_respond_info("MMU: Tip-Forming beendet, Lüfter aus.")}

#####################################################################
# MMU Quick TIP-Test
#####################################################################

[gcode_macro MMU_QUICK_TIP_TEST]
description: Startet den kompletten Test ohne MMU: Laden -> Profil setzen -> Tip formen.
gcode:
    # Fluidd Dropdown-Trigger:
    # MATERIAL: {PLA, PETG, Default}
    
    {% set mat = params.MATERIAL|default("PLA")|string %}
    {% set current_temp = printer.extruder.temperature|float %}

    {% if current_temp < 200 %}
        {action_respond_info("ABBRUCH: Duese zu kalt (" ~ current_temp ~ "C)!")}
        Frame_Light_OFF
        G4 P500
        Frame_Light_ON
    {% else %}
        {action_respond_info("MMU-TEST: " ~ mat)}
        MMU_LOAD EXTRUDER_ONLY=1
        _SET_MATERIAL_VARS MATERIAL={mat}
        MMU_TEST_FORM_TIP
    {% endif %}

#####################################################################
# MMU TIP-Forming mit MMU
#####################################################################

[gcode_macro MMU_PREPARE_SPOOL_TIP]
description: Lädt Filament, formt Spitze und parkt im Gate.
# Definition der Parameter für das Fluidd/Mainsail UI:
# MATERIAL: {PLA, PETG, Default}
gcode:
    # Parameter abgreifen
    {% set gate = params.GATE|default(0)|int %}
    {% set mat = params.MATERIAL|default("PLA")|string %}
    {% set current_temp = printer.extruder.temperature|float %}

    {% if current_temp < 200 %}
        {action_respond_info("ABBRUCH: Duese zu kalt (" ~ current_temp ~ "C)!")}
        Frame_Light_OFF
        G4 P500
        Frame_Light_ON
    {% else %}
        {action_respond_info("MMU-TIP-PREP: Starte Gate " ~ gate ~ " (" ~ mat ~ ")")}
        
        # 1. Selektor zum Gate bewegen
        MMU__SELECT_TOOL TOOL={gate}
        
        # 2. Filament komplett laden (Gate bis Düse)
        MMU_LOAD
        
        # 3. Material-Profil setzen (für deine Tip-Variablen)
        _SET_MATERIAL_VARS MATERIAL={mat}
        
        # 4. Tip forming Prozess von Happy Hare
        MMU_TEST_FORM_TIP
        
        # 5. Filament sauber zurück ins Gate ejecten
        MMU_EJECT
        
        {action_respond_info("MMU-TIP-PREP: Abgeschlossen für Gate " ~ gate)}
    {% endif %}