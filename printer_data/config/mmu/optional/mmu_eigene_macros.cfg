#####################################################################
# Materialabhängiges TIP-FORMING (V2 - Autodetect)
#####################################################################

[gcode_macro _SET_MATERIAL_VARS]
description: Setzt Tip-Forming Parameter (Sticky Version)
gcode:
    # 1. Material bestimmen (Parameter > Status)
    {% set MAT_PARAM = params.MATERIAL | default("") | upper %}
    {% set MAT_STATUS = printer.mmu.filament_type | default("") | upper %}
    {% set MATERIAL = MAT_PARAM if MAT_PARAM != "" else MAT_STATUS %}

    # FALLS MATERIAL LEER IST: Nichts tun, keine Warnung, keine Defaults!
    {% if MATERIAL == "" or MATERIAL == "UNKNOWN" %}
        {action_respond_info("MMU: Kein neues Material erkannt. Behalte bestehende Parameter bei.")}
        M106 S255 ; Wir machen trotzdem den Lüfter an, sicher ist sicher.
    {% else %}
        {action_respond_info("MMU: Profil-Check für: '" ~ MATERIAL ~ "'")}
    
        {% if "PETG" in MATERIAL %}
            {action_respond_info("MMU: PETG Profil aktiv")}
            M106 S255 ; Schock-Kühlung an
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=210
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=150
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=80
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=5
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=True
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=skinnydip_distance VALUE=26.3
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=dip_extraction_speed VALUE=900
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=melt_zone_pause VALUE=50

        {% elif "PLA" in MATERIAL %}
            {action_respond_info("MMU: PLA Profil aktiv (Finale Faden-Einkürzung)")}
            M106 S255 ; Schock-Kühlung an
            
            ; 1. Ramming (Beibehalten, da es den Plopp perfekt eliminiert hat)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=3
            
            ; 2. Temperatur beim Werkzeugwechsel
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=190
            
            ; 3. Geschwindigkeit des allerersten Rückzugs
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=40
            
            ; 4. Erste Geschwindigkeit der Kühlbewegung (Maximiert auf 75, um den Faden zu kappen)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=50
            
            ; 5. Position des Kühlrohrs
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=32
            
            ; 6. Länge des Kühlrohrs
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=10
            
            ; 7. Anzahl der Kühlbewegungen
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=0
            
            ; 8. Skinnydip bleibt dauerhaft AUS
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=False
            
            ; 9. Distanz (Inaktiv)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=skinnydip_distance VALUE=26.5
            
            ; 10. Geschwindigkeit beim Herausziehen (Inaktiv)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=dip_extraction_speed VALUE=800
            
            ; 11. Verweilzeit im Hotend (Inaktiv)
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=melt_zone_pause VALUE=0

        {% else %}
            {action_respond_info("WARNUNG: Material '" ~ MATERIAL ~ "' unbekannt! Lade DEFAULT.")}
            Frame_Light_OFF
            G4 P500
            Frame_Light_ON
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=ramming_volume VALUE=0
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=toolchange_temp VALUE=0 
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_position VALUE=35
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_tube_length VALUE=20
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=initial_cooling_speed VALUE=10
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=unloading_speed_start VALUE=60
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=cooling_moves VALUE=12
            SET_GCODE_VARIABLE MACRO=_MMU_FORM_TIP_VARS VARIABLE=use_skinnydip VALUE=False
        {% endif %}
    {% endif %} # <--- Dieses ENDIF hat gefehlt, um die Sticky-Logik zu schließen!

[gcode_macro CHECK_MMU_VARS]
description: Zeigt die aktuell geladenen Tip-Forming Parameter an
gcode:
    {% set vars = printer["gcode_macro _MMU_FORM_TIP_VARS"] %}
    {action_respond_info("--- AKTUELLE MMU TIP PARAMETER ---")}
    {action_respond_info("Ramming Volume: " ~ vars.ramming_volume ~ " qmm")}
    {action_respond_info("Temperatur: " ~ vars.toolchange_temp ~ " C")}
    {action_respond_info("Cooling Moves: " ~ vars.cooling_moves)}
    {action_respond_info("Cooling Tube Position: " ~ vars.cooling_tube_position ~ " mm")}
    {action_respond_info("Cooling Tube Length: " ~ vars.cooling_tube_length ~ " mm")}
    {action_respond_info("Unloading Speed Start: " ~ vars.unloading_speed_start ~ " mm/s")}
    {action_respond_info("Skinnydip aktiv: " ~ vars.use_skinnydip)}
    {action_respond_info("Skinnydip Distanz: " ~ vars.skinnydip_distance ~ " mm")}
    {action_respond_info("Dip Extraction Speed: " ~ vars.dip_extraction_speed ~ " mm/s")}
    {action_respond_info("Initial Cooling Speed: " ~ vars.initial_cooling_speed ~ " mm/s")}
    {action_respond_info("Meltzone Pause: " ~ vars.melt_zone_pause ~ " ms")}
    {action_respond_info("-------------Ende----------------")}

[gcode_macro _MMU_POST_FORM_TIP]
description: Wird automatisch von Happy Hare nach dem Formvorgang aufgerufen
gcode:
    M107 ; Schaltet den Bauteillüfter wieder aus
    {action_respond_info("MMU: Tip-Forming beendet, Lüfter aus.")}

#####################################################################
# MMU Quick TIP-Test
#####################################################################

[gcode_macro MMU_QUICK_TIP_TEST]
description: Startet den kompletten Test ohne MMU: Laden -> Profil setzen -> Tip formen.
gcode:
    # Fluidd Dropdown-Trigger:
    # MATERIAL: {PLA, PETG, Default}
    
    {% set mat = params.MATERIAL|default("PLA")|string %}
    {% set current_temp = printer.extruder.temperature|float %}

    {% if current_temp < 200 %}
        {action_respond_info("ABBRUCH: Duese zu kalt (" ~ current_temp ~ "C)!")}
        Frame_Light_OFF
        G4 P500
        Frame_Light_ON
    {% else %}
        {action_respond_info("MMU-TEST: " ~ mat)}
        MMU_LOAD EXTRUDER_ONLY=1
        _SET_MATERIAL_VARS MATERIAL={mat}
        MMU_TEST_FORM_TIP
    {% endif %}

#####################################################################
# MMU TIP-Forming mit MMU
#####################################################################

[gcode_macro MMU_PREPARE_SPOOL_TIP]
description: Lädt Filament, formt Spitze und parkt im Gate.
gcode:
    # Parameter abgreifen
    {% set gate = params.GATE|default(0)|int %}
    {% set mat = params.MATERIAL|default("PLA")|string %}
    {% set current_temp = printer.extruder.temperature|float %}

    {% if current_temp < 200 %}
        {action_respond_info("ABBRUCH: Duese zu kalt (" ~ current_temp ~ "C)!")}
        Frame_Light_OFF
        G4 P500
        Frame_Light_ON
    {% else %}
        {action_respond_info("MMU-TIP-PREP: Starte Gate " ~ gate ~ " (" ~ mat ~ ")")}
        
        # 1. Selektor zum Gate bewegen
        MMU__SELECT_TOOL TOOL={gate}
        
        # 2. Filament komplett laden (Gate bis Düse)
        MMU_LOAD
        
        # 3. Material-Profil setzen (lädt deine exakten Flowtech-Variablen)
        _SET_MATERIAL_VARS MATERIAL={mat}

        # 4. Kurze Wartezeit zum Druckausgleich
        G4 P2000
        
        # 5. Erste und einzige Spitze formen (Status bleibt aktiv)
        _MMU_FORM_TIP
        
        # 6. Kurze Pause zur Stabilisierung
        G4 P1000
        
        # 7. Happy Hare dynamisch mitteilen, dass es NACH dem kompletten Parken unser Makro aufruft
        SET_GCODE_VARIABLE MACRO=_MMU_SEQUENCE_VARS VARIABLE=user_post_unload_extension VALUE='"MMU_DUE_AUS"'
        
        # 8. Komplett entladen – ohne erneutes Tipforming
        MMU_UNLOAD WIPE=0 SKIP_TIP=1
        
        {action_respond_info("MMU-TIP-PREP: Unload läuft, Abschalt-Befehl ist für danach geparkt.")}
    {% endif %}

[gcode_macro MMU_DUE_AUS]
description: Schaltet die Düse aus und löscht die Pause nach dem HH-Unload
gcode:
    # 1. Heizung endgültig ausschalten
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
    M104 S0
    
    # 2. Den lästigen Pausen-Status löschen
    CLEAR_PAUSE
    
    # 3. Die Happy Hare Erweiterung wieder leeren (wichtig für den normalen Druckbetrieb!)
    SET_GCODE_VARIABLE MACRO=_MMU_SEQUENCE_VARS VARIABLE=user_post_unload_extension VALUE='""'
    
    {action_respond_info("MMU-TIP-PREP: Happy Hare fertig. Heizung ist AUS und Pause gelöscht.")}